<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SClaw Chat</title>
    <script src="js/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #e8f5e9;
            --text-primary: #1a1a1a;
            --text-secondary: #6c757d;
            --accent: #22c55e;
            --success: #4ade80;
            --warning: #fbbf24;
            --error: #ef4444;
            --user-msg-bg: #22c55e;
            --bot-msg-bg: #e8f5e9;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: var(--bg-secondary);
            padding: 15px 20px;
            border-bottom: 1px solid var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 1.4rem;
            color: var(--accent);
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-online {
            background: var(--success);
            color: #000;
        }
        .status-offline {
            background: var(--error);
            color: #fff;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        .message.user {
            align-items: flex-end;
        }
        .message.bot {
            align-items: flex-start;
        }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }
        .message.user .message-content {
            background: var(--user-msg-bg);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.bot .message-content {
            background: var(--bot-msg-bg);
            border-bottom-left-radius: 4px;
        }
        .message-content {
            line-height: 1.6;
        }
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4,
        .message-content h5,
        .message-content h6 {
            margin-top: 16px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .message-content h1 { font-size: 1.5rem; }
        .message-content h2 { font-size: 1.3rem; }
        .message-content h3 { font-size: 1.1rem; }
        .message-content h4 { font-size: 1rem; }
        .message-content p {
            margin-bottom: 8px;
        }
        .message-content ul,
        .message-content ol {
            margin-left: 20px;
            margin-bottom: 8px;
        }
        .message-content li {
            margin-bottom: 4px;
        }
        .message-content code {
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        .message-content pre {
            background: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .message-content pre code {
            background: transparent;
            padding: 0;
        }
        .message-content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 12px;
            margin: 10px 0;
            color: var(--text-secondary);
        }
        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
        }
        .message-content th,
        .message-content td {
            border: 1px solid var(--bg-card);
            padding: 8px 12px;
            text-align: left;
        }
        .message-content th {
            background: var(--bg-card);
            font-weight: 600;
        }
        .message-content a {
            color: var(--accent);
            text-decoration: none;
        }
        .message-content a:hover {
            text-decoration: underline;
        }
        .message-content strong {
            font-weight: 600;
        }
        .message-content em {
            font-style: italic;
        }
        .message-content hr {
            border: none;
            border-top: 1px solid var(--bg-card);
            margin: 16px 0;
        }
        .message-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bot-msg-bg);
            border-radius: 12px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
        .input-container {
            display: flex;
            gap: 10px;
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 12px;
        }
        .input-container textarea {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--bg-card);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            min-height: 50px;
            max-height: 150px;
        }
        .input-container textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .send-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .send-btn:hover {
            opacity: 0.8;
        }
        .send-btn:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
        }
        .clear-btn {
            background: var(--error);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .clear-btn:hover {
            opacity: 0.8;
        }
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .welcome-message h2 {
            color: var(--accent);
            margin-bottom: 10px;
        }
        .welcome-message p {
            font-size: 0.9rem;
        }
        .error-message {
            background: var(--error);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        pre {
            background: var(--bg-primary);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }
        code {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SClaw Chat</h1>
        <span id="status-badge" class="status-badge status-offline">Connecting...</span>
    </div>

    <div class="chat-container">
        <div id="messages" class="messages">
            <div class="welcome-message">
                <h2>Welcome to SClaw</h2>
                <p>Your secure AI assistant is ready. Start a conversation below!</p>
            </div>
        </div>

        <div class="input-container">
            <button class="clear-btn" onclick="clearChat()">Clear</button>
            <textarea 
                id="message-input" 
                placeholder="Type your message..." 
                rows="1"
                onkeydown="handleKeyDown(event)"
            ></textarea>
            <button id="send-btn" class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let sessionId = generateSessionId();
        let isTyping = false;

        function generateSessionId() {
            return 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message || isTyping) return;

            addMessage(message, 'user');
            input.value = '';
            input.style.height = 'auto';

            isTyping = true;
            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                hideTypingIndicator();
                addMessage(data.response, 'bot');
            } catch (error) {
                hideTypingIndicator();
                addMessage(`Error: ${error.message}`, 'bot');
            }

            isTyping = false;
        }

        function addMessage(content, type) {
            const messagesContainer = document.getElementById('messages');
            const welcomeMessage = messagesContainer.querySelector('.welcome-message');
            if (welcomeMessage) {
                welcomeMessage.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(content);

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString();

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            messagesContainer.appendChild(messageDiv);

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function formatMessage(content) {
            if (!content) return '';

            // Escape HTML to prevent XSS
            let escaped = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Use marked.js to parse Markdown
            try {
                return marked.parse(escaped);
            } catch (error) {
                console.error('Markdown parsing error:', error);
                // Fallback to simple formatting
                return escaped.replace(/\n/g, '<br>');
            }
        }

        function showTypingIndicator() {
            const messagesContainer = document.getElementById('messages');
            const indicator = document.createElement('div');
            indicator.id = 'typing-indicator';
            indicator.className = 'message bot';
            indicator.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function clearChat() {
            const messagesContainer = document.getElementById('messages');
            messagesContainer.innerHTML = `
                <div class="welcome-message">
                    <h2>Welcome to SClaw</h2>
                    <p>Your secure AI assistant is ready. Start a conversation below!</p>
                </div>
            `;
            sessionId = generateSessionId();
        }

        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const statusBadge = document.getElementById('status-badge');
                if (data.status === 'online') {
                    statusBadge.textContent = 'Online';
                    statusBadge.className = 'status-badge status-online';
                } else {
                    statusBadge.textContent = 'Offline';
                    statusBadge.className = 'status-badge status-offline';
                }
            } catch (error) {
                const statusBadge = document.getElementById('status-badge');
                statusBadge.textContent = 'Offline';
                statusBadge.className = 'status-badge status-offline';
            }
        }

        const textarea = document.getElementById('message-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        checkStatus();
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
